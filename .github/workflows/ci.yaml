name: needs-Git-action

on:
  push:

jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
      - run: echo "A job consists of"
      - run: echo "One or more steps"
      - runs: echo "Which runs secquctialy"
      - runs: echo "With in the same computer inviorment" 

  jobs-2:
    runs-on: ubuntu-latest
    steps:
      - runs: echo "Multiple jobs can be run in paralal"
  jobs-3:
    runs-on: ubuntu-latest
    needs:
      - job-1
      - job-2
    steps: 
      - runs: echo "They can depends one another"
  Jobs-4: 
    runs-on: ubuntu-latest
    needs:
      - Jobs-2
      - jobs-3
    steps:
      - runs: echo "... A DAG"


      
